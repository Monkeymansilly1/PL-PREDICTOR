<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>West Ham Predictor</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>West Ham United</h1>
<p>Upcoming fixtures in all competitions.</p>

<div class="container">

<div class="card">

<h2>Upcoming Matches</h2>
<button onclick="loadFixtures()">Refresh Fixtures</button>

<div id="fixtures">
Loading fixtures...
</div>

</div>

<div class="card">

<h2>Premier League Table</h2>

<table id="table">
<thead>
<tr>
<th>#</th>
<th>Team</th>
<th>Pts</th>
</tr>
</thead>

<tbody id="table-body"></tbody>

</table>

</div>

</div>

<div class="card predictor">

<h2>Season Predictor</h2>

<button onclick="runPrediction()">Predict Season</button>

<p id="prediction">
Click to simulate the rest of the season.
</p>

</div>

<script src="app.js"></script>

</body>
</html>
